<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polymarket Trading Bot</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06090f;--bg2:#0b1017;--card:#0f1520;--card-hover:#131c2b;
  --border:#1a2435;--border-hi:#253650;
  --t:#c9d1d9;--t2:#7b8a9e;--t3:#4a5568;--tw:#e8edf4;
  --g:#00d4aa;--gd:#00d4aa20;--gb:#00d4aa40;
  --r:#ff5c5c;--rd:#ff5c5c18;
  --y:#f0b429;--yd:#f0b42920;
  --b:#58a6ff;--bd:#58a6ff20;
}
body{background:var(--bg);color:var(--t);font-family:'Inter',system-ui,sans-serif;min-height:100vh}
.mono{font-family:'JetBrains Mono','SF Mono',monospace}
.container{max-width:1400px;margin:0 auto;padding:20px 24px}

/* ── Header ── */
.hdr{display:flex;justify-content:space-between;align-items:center;padding:16px 0 20px;border-bottom:1px solid var(--border);margin-bottom:20px}
.hdr-left{display:flex;align-items:center;gap:14px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.on{background:var(--g);box-shadow:0 0 12px var(--g)}
.dot.off{background:var(--r);box-shadow:0 0 12px var(--r)}
.hdr h1{font-size:18px;font-weight:700;color:var(--tw);letter-spacing:-.03em}
.hdr-sub{font-size:11px;color:var(--t2);margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:12px}
.sse-pill{font-size:10px;padding:3px 10px;border-radius:99px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.sse-pill.live{background:var(--gd);color:var(--g)}
.sse-pill.off{background:var(--rd);color:var(--r)}

/* ── Stats ── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:16px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;transition:border-color .2s}
.stat:hover{border-color:var(--border-hi)}
.stat-label{font-size:10px;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;font-weight:600}
.stat-val{font-size:22px;font-weight:800;letter-spacing:-.02em}
.stat-sub{font-size:10px;color:var(--t3);margin-top:2px}

/* ── Activity Feed ── */
.feed{display:flex;gap:8px;overflow-x:auto;padding:8px 0 12px;margin-bottom:4px;scrollbar-width:none}
.feed::-webkit-scrollbar{display:none}
.feed-item{flex-shrink:0;font-size:11px;padding:5px 12px;border-radius:6px;background:var(--bg2);border:1px solid var(--border);color:var(--t2);white-space:nowrap}
.feed-item.green{border-color:var(--g);color:var(--g);background:var(--gd)}
.feed-item.red{border-color:var(--r);color:var(--r);background:var(--rd)}
.feed-item.blue{border-color:var(--b);color:var(--b);background:var(--bd)}

/* ── Tabs ── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--t3);padding:10px 18px;font-size:12px;font-weight:600;cursor:pointer;transition:.2s;letter-spacing:.01em}
.tab:hover{color:var(--t2)}
.tab.on{border-color:var(--g);color:var(--tw)}

/* ── Market Rows ── */
.mkt{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;cursor:pointer;transition:all .15s;overflow:hidden}
.mkt:hover{border-color:var(--border-hi);background:var(--card-hover)}
.mkt-row{display:flex;align-items:center;padding:12px 16px;gap:12px}
.mkt-edge-bar{width:4px;border-radius:2px;align-self:stretch;min-height:36px;flex-shrink:0}
.mkt-body{flex:1;min-width:0}
.mkt-q{font-size:13px;font-weight:600;color:var(--tw);line-height:1.35;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mkt-sub{font-size:11px;color:var(--t3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mkt-metrics{display:flex;gap:20px;flex-shrink:0}
.mkt-m{text-align:right}
.mkt-m-label{font-size:9px;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;font-weight:600}
.mkt-m-val{font-size:15px;font-weight:700;margin-top:1px}

/* ── Detail Panel ── */
.detail{max-height:0;overflow:hidden;transition:max-height .3s ease;background:var(--bg2);border-top:1px solid var(--border)}
.detail.open{max-height:800px}
.detail-inner{padding:16px 20px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.detail-section{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px}
.detail-section h3{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-bottom:10px}
.detail-full{grid-column:1/-1}

/* ── Probability Bar ── */
.prob-bar{display:flex;align-items:center;gap:12px;margin:8px 0}
.prob-track{flex:1;height:8px;background:var(--border);border-radius:4px;position:relative;overflow:hidden}
.prob-fill{height:100%;border-radius:4px;transition:width .4s}
.prob-marker{position:absolute;top:-4px;width:3px;height:16px;border-radius:2px;transform:translateX(-50%)}

/* ── Component Bars ── */
.comp-row{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:12px}
.comp-label{width:80px;color:var(--t2);flex-shrink:0;font-size:11px}
.comp-bar-track{flex:1;height:6px;background:var(--border);border-radius:3px;position:relative}
.comp-bar-fill{height:100%;border-radius:3px;position:absolute;top:0}
.comp-val{width:50px;text-align:right;font-size:11px;color:var(--t2)}

/* ── Positions ── */
.pos{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.06em;display:inline-block}
.badge-g{background:var(--gd);color:var(--g)}
.badge-r{background:var(--rd);color:var(--r)}
.badge-y{background:var(--yd);color:var(--y)}
.badge-b{background:var(--bd);color:var(--b)}

.web-ctx{font-size:11px;color:var(--t2);line-height:1.5;max-height:120px;overflow-y:auto;padding:8px;background:var(--bg);border-radius:6px;border:1px solid var(--border)}

.empty{padding:48px 20px;text-align:center;color:var(--t3);font-size:13px}
.footer{padding:14px 0;border-top:1px solid var(--border);font-size:10px;color:var(--t3);display:flex;justify-content:space-between;margin-top:24px}
</style>
</head>
<body>
<div class="container">

<div class="hdr">
  <div>
    <div class="hdr-left">
      <div class="dot on" id="dot"></div>
      <div>
        <h1>Polymarket Trading Bot</h1>
        <div class="hdr-sub" id="sub">Connecting...</div>
      </div>
    </div>
  </div>
  <div class="hdr-right">
    <span class="sse-pill off" id="ssePill">Offline</span>
  </div>
</div>

<div class="stats" id="stats"></div>
<div class="feed" id="feed"></div>

<div class="tabs" id="tabs">
  <button class="tab on" data-t="markets">Markets (0)</button>
  <button class="tab" data-t="opportunities">Signals (0)</button>
  <button class="tab" data-t="positions">Positions (0)</button>
  <button class="tab" data-t="history">History (0)</button>
</div>

<div id="content"></div>
<div class="footer"><span id="sseInfo">Connecting...</span><span id="updated"></span></div>

</div>
<script>
// ── Utils ──
const P=(v,d=1)=>(v*100).toFixed(d)+'%';
const $=(v)=>'$'+Number(v||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const ago=(iso)=>{if(!iso)return'\u2014';const s=Math.floor((Date.now()-new Date(iso))/1e3);return s<60?s+'s ago':s<3600?Math.floor(s/60)+'m ago':Math.floor(s/3600)+'h ago'};
const X=(s)=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));

// ── State ──
let data=null, tab='markets', expandedId=null;
const activityLog=[];
function addActivity(text,cls=''){activityLog.unshift({text,cls,t:Date.now()});if(activityLog.length>8)activityLog.pop();renderFeed()}

// ── Colors ──
const edgeClr=(e)=>{const a=Math.abs(e);return a>.12?'var(--g)':a>.06?'var(--y)':a>.03?'var(--b)':'var(--t3)'};
const pnlClr=(v)=>v>0?'var(--g)':v<0?'var(--r)':'var(--t2)';

// ── Render: Stats ──
function renderStats(p){
  if(!p)return;
  const items=[
    {l:'Bankroll',v:$(p.bankroll),c:'var(--tw)'},
    {l:'Return',v:(p.total_return>=0?'+':'')+P(p.total_return),c:pnlClr(p.total_return)},
    {l:'P&L',v:(p.total_pnl_closed>=0?'+':'')+$(p.total_pnl_closed),c:pnlClr(p.total_pnl_closed)},
    {l:'Exposure',v:P(p.exposure_pct,0),c:'var(--tw)',s:$(p.total_exposure)+' deployed'},
    {l:'Drawdown',v:P(p.drawdown),c:p.drawdown>.1?'var(--r)':p.drawdown>.05?'var(--y)':'var(--tw)'},
    {l:'Win Rate',v:p.closed_trades>0?P(p.win_rate,0):'\u2014',c:'var(--tw)',s:p.wins+'W / '+p.losses+'L'},
  ];
  document.getElementById('stats').innerHTML=items.map(i=>`<div class="stat"><div class="stat-label">${i.l}</div><div class="stat-val mono" style="color:${i.c}">${i.v}</div>${i.s?'<div class="stat-sub">'+i.s+'</div>':''}</div>`).join('');
}

// ── Render: Activity Feed ──
function renderFeed(){
  document.getElementById('feed').innerHTML=activityLog.map(a=>`<div class="feed-item ${a.cls}">${X(a.text)}</div>`).join('');
}

// ── Render: Market Row + Detail ──
function renderMarket(m, idx){
  const e=m.edge||0, ae=Math.abs(e);
  const isExp=expandedId===idx;
  const barClr=edgeClr(e);
  const comp=m.components||{};
  const llm=comp.llm_signals||null;

  let detail='';
  if(isExp){
    // Prob comparison bar
    const mp=m.market_prob||0, ep=m.estimated_prob||0;
    const probBar=`<div class="prob-bar">
      <span class="mono" style="font-size:11px;color:var(--t2);width:60px">Market</span>
      <div class="prob-track"><div class="prob-fill" style="width:${mp*100}%;background:var(--t3)"></div></div>
      <span class="mono" style="font-size:12px;font-weight:700;width:45px;text-align:right">${P(mp,0)}</span>
    </div><div class="prob-bar">
      <span class="mono" style="font-size:11px;color:var(--g);width:60px">AI Est.</span>
      <div class="prob-track"><div class="prob-fill" style="width:${ep*100}%;background:var(--g)"></div></div>
      <span class="mono" style="font-size:12px;font-weight:700;width:45px;text-align:right;color:var(--g)">${P(ep,0)}</span>
    </div>`;
    if(llm){
      const lp=llm.llm_probability||0;
      detail+=`<div class="prob-bar">
        <span class="mono" style="font-size:11px;color:var(--b);width:60px">LLM</span>
        <div class="prob-track"><div class="prob-fill" style="width:${lp*100}%;background:var(--b)"></div></div>
        <span class="mono" style="font-size:12px;font-weight:700;width:45px;text-align:right;color:var(--b)">${P(lp,0)}</span>
      </div>`;
    }

    // Components
    const comps=[
      {l:'FLB',v:comp.flb_correction,base:mp},
      {l:'Time',v:comp.time_decay},
      {l:'Liquidity',v:comp.liquidity_signal},
      {l:'Volume',v:comp.volume_momentum},
    ];
    let compHtml=comps.filter(c=>c.v!==undefined&&c.v!==null).map(c=>{
      const val=typeof c.v==='number'?(c.base?c.v-c.base:c.v):0;
      const w=clamp(Math.abs(val)*500,2,100);
      const clr=val>0?'var(--g)':val<0?'var(--r)':'var(--t3)';
      return `<div class="comp-row"><span class="comp-label">${c.l}</span><div class="comp-bar-track"><div class="comp-bar-fill" style="width:${w}%;background:${clr};left:${val<0?100-w:50}%"></div></div><span class="comp-val mono">${val>=0?'+':''}${(val*100).toFixed(1)}%</span></div>`;
    }).join('');

    // LLM section
    let llmHtml='';
    if(llm){
      llmHtml=`<div class="detail-section"><h3>AI Analysis</h3>
        <div style="font-size:12px;color:var(--tw);line-height:1.5;margin-bottom:10px">${X(llm.llm_reasoning||'')}</div>
        <div style="display:flex;gap:16px;font-size:11px">
          <span>Probability: <span class="mono" style="color:var(--b);font-weight:700">${P(llm.llm_probability||0,0)}</span></span>
          <span>Confidence: <span class="mono" style="font-weight:700">${P(llm.llm_confidence||0,0)}</span></span>
        </div>
        ${llm.web_context?'<div style="margin-top:10px"><h3 style="margin-bottom:6px">Web Context</h3><div class="web-ctx">'+X(llm.web_context)+'</div></div>':''}
      </div>`;
    }

    detail=`<div class="detail open"><div class="detail-inner">
      <div class="detail-grid">
        <div class="detail-section"><h3>Probability Comparison</h3>${probBar}${detail}</div>
        <div class="detail-section"><h3>Signal Components</h3>${compHtml||'<div style="color:var(--t3);font-size:12px">No component data</div>'}</div>
        ${llmHtml?'<div class="detail-full">'+llmHtml+'</div>':''}
        <div class="detail-section detail-full"><h3>Full Reasoning</h3><div style="font-size:12px;color:var(--t2);line-height:1.6">${X(m.reasoning||'No reasoning available')}</div></div>
      </div>
    </div></div>`;
  }

  return `<div class="mkt" onclick="toggle(${idx})">
    <div class="mkt-row">
      <div class="mkt-edge-bar" style="background:${barClr}"></div>
      <div class="mkt-body">
        <div class="mkt-q">${X(m.question||'')}</div>
        <div class="mkt-sub">${X((m.reasoning||'').substring(0,100))}</div>
      </div>
      <div class="mkt-metrics">
        <div class="mkt-m"><div class="mkt-m-label">Current Price</div><div class="mkt-m-val mono">${P(m.market_prob||m.market_price||0,0)}</div></div>
        <div class="mkt-m"><div class="mkt-m-label">AI Fair Value</div><div class="mkt-m-val mono" style="color:var(--g)">${P(m.estimated_prob||0,0)}</div></div>
        <div class="mkt-m"><div class="mkt-m-label">Mispricing</div><div class="mkt-m-val mono" style="color:${edgeClr(e)}">${e>=0?'+':''}${P(e)}</div></div>
        <div class="mkt-m"><div class="mkt-m-label">AI Certainty</div><div class="mkt-m-val mono">${P(m.confidence||0,0)}</div></div>
      </div>
    </div>${detail}
  </div>`;
}

function toggle(idx){expandedId=expandedId===idx?null:idx;render()}

// ── Render: Positions ──
function renderPositions(positions){
  if(!positions.length)return '<div class="empty">No open positions</div>';
  return positions.map(p=>{
    const pnl=p.pnl||p.unrealized_pnl||0;
    const dirCls=p.direction==='yes'?'badge-g':'badge-r';
    const typeCls=p.position_type==='scalp'?'<span class="badge badge-y">SCALP</span>':'';
    return `<div class="pos">
      <div style="flex:1;min-width:0">
        <div style="display:flex;gap:6px;align-items:center;margin-bottom:4px">
          <span class="badge ${dirCls}">${X(p.direction||'')}</span>${typeCls}
          <span style="font-size:10px;color:var(--t3)">${X(p.category||'')}</span>
        </div>
        <div style="font-size:13px;font-weight:600;color:var(--tw);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${X(p.question||'')}</div>
        <div style="font-size:10px;color:var(--t3);margin-top:3px">${p.num_shares} shares @ ${$(p.entry_price)} ${p.opened_at?'&middot; '+ago(p.opened_at):''}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:10px;color:var(--t3)">VALUE / P&L</div>
        <div class="mono" style="font-size:16px;font-weight:700">${$(p.current_value||p.total_cost)}</div>
        <div class="mono" style="font-size:12px;color:${pnlClr(pnl)}">${pnl>=0?'+':''}${$(pnl)}</div>
      </div>
    </div>`;
  }).join('');
}

// ── Render: History ──
function renderHistory(trades){
  if(!trades.length)return '<div class="empty">No trade history</div>';
  return [...trades].reverse().map(t=>{
    const win=(t.pnl||0)>=0;
    return `<div class="pos">
      <div style="flex:1;min-width:0">
        <div style="display:flex;gap:6px;align-items:center;margin-bottom:4px">
          <span class="badge ${win?'badge-g':'badge-r'}">${win?'WIN':'LOSS'}</span>
          <span class="badge ${t.direction==='yes'?'badge-g':'badge-r'}">${X((t.direction||'').toUpperCase())}</span>
        </div>
        <div style="font-size:13px;font-weight:600;color:var(--tw)">${X(t.question||'')}</div>
        <div style="font-size:10px;color:var(--t3);margin-top:3px">Closed ${ago(t.closed_at)}</div>
      </div>
      <div style="text-align:right">
        <div class="mono" style="font-size:18px;font-weight:700;color:${pnlClr(t.pnl||0)}">${(t.pnl||0)>=0?'+':''}${$(t.pnl||0)}</div>
        <div class="mono" style="font-size:11px;color:${pnlClr(t.return_pct||0)}">${(t.return_pct||0)>=0?'+':''}${P(t.return_pct||0)}</div>
      </div>
    </div>`;
  }).join('');
}

// ── Render: Progress ──
function renderProgress(p){
  if(!p||!p.total||p.done>=p.total)return '';
  const pct=Math.round(p.done/p.total*100);
  return `<div style="margin-bottom:12px;padding:10px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px">
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--t2);margin-bottom:6px">
      <span>Analyzing markets...</span><span class="mono">${p.done}/${p.total}</span>
    </div>
    <div style="background:var(--border);border-radius:3px;height:3px;overflow:hidden">
      <div style="background:var(--g);height:100%;width:${pct}%;transition:width .3s"></div>
    </div>
  </div>`;
}

// ── Main Render ──
function render(){
  if(!data)return;
  const p=data.portfolio||{};
  const mkts=data.scanned_markets||[];
  const opps=data.opportunities||[];
  const pos=data.open_positions||[];
  const hist=data.closed_positions||[];
  const prog=data.scan_progress;

  // Header
  document.getElementById('dot').className='dot '+(p.is_halted?'off':'on');
  document.getElementById('sub').textContent=(p.is_halted?'HALTED: '+p.halt_reason:'System active')+' \u00b7 Last scan '+ago(data.last_scan);
  renderStats(p);

  // Tabs
  document.querySelectorAll('.tab').forEach(b=>{
    const t=b.dataset.t;
    b.classList.toggle('on',t===tab);
    if(t==='markets')b.textContent='Markets ('+mkts.length+')';
    if(t==='opportunities')b.textContent='Signals ('+opps.length+')';
    if(t==='positions')b.textContent='Positions ('+pos.length+')';
    if(t==='history')b.textContent='History ('+hist.length+')';
  });

  // Content
  const el=document.getElementById('content');
  const progress=renderProgress(prog);

  if(tab==='markets'){
    el.innerHTML=progress+(mkts.length?mkts.map((m,i)=>renderMarket(m,i)).join(''):'<div class="empty">No markets analyzed yet. Waiting for scan...</div>');
  }else if(tab==='opportunities'){
    el.innerHTML=opps.length?opps.map((m,i)=>renderMarket(m,100+i)).join(''):'<div class="empty">No trading signals found</div>';
  }else if(tab==='positions'){
    el.innerHTML=renderPositions(pos);
  }else{
    el.innerHTML=renderHistory(hist);
  }

  document.getElementById('updated').textContent='Updated '+ago(data.updated_at);
}

// ── Tab Switch ──
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{tab=b.dataset.t;expandedId=null;render()}));

// ── Data Loading ──
async function loadData(){
  try{const r=await fetch('/api/dashboard');if(r.ok){data=await r.json();render()}}catch(e){console.error(e)}
}
loadData();

// ── SSE ──
function connectSSE(){
  const es=new EventSource('/api/events');
  const pill=document.getElementById('ssePill');
  const info=document.getElementById('sseInfo');

  es.addEventListener('open',()=>{pill.textContent='Live';pill.className='sse-pill live';info.textContent='SSE: Connected';addActivity('Connected to server','green')});

  es.addEventListener('dashboard',(e)=>{data=JSON.parse(e.data);render()});

  es.addEventListener('scan_progress',(e)=>{
    if(!data)return;
    const p=JSON.parse(e.data);
    data.scan_progress={done:p.done,total:p.total};
    if(p.scanned_markets)data.scanned_markets=p.scanned_markets;
    render();
  });

  es.addEventListener('scan_complete',(e)=>{
    const d=JSON.parse(e.data);
    addActivity(`Scan done: ${d.estimates} markets, ${d.opportunities} signals, ${d.duration}s`,'blue');
  });

  es.addEventListener('trade_executed',(e)=>{
    const d=JSON.parse(e.data);
    addActivity(`Trade: ${d.question||'Unknown'}`,'green');
  });

  es.onerror=()=>{
    pill.textContent='Offline';pill.className='sse-pill off';info.textContent='SSE: Reconnecting...';
    es.close();setTimeout(connectSSE,3000);
  };
}
connectSSE();
</script>
</body>
</html>
